name: Rebuild NBA TypeScript data files

on:
  push:
    branches: [main]
    paths:
      - "nba/public/data/*.xlsx"

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: nba/package.json
      - name: Install NBA app dependencies
        run: npm install
        working-directory: nba
      - name: Regenerate TypeScript data files
        run: npx tsx scripts/convertData.ts
        working-directory: nba
      - name: Commit regenerated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nba/src/data/nbaMcResults.ts nba/src/data/nbaSchedule.ts                   nba/src/data/nbaStandings.ts nba/src/data/nbaSnapshot.ts                   nba/src/data/nbaRankings.ts nba/src/data/nbaMatchupProbs.ts
          git diff --staged --quiet || git commit -m "Auto-regenerate NBA TypeScript data"
          git push
