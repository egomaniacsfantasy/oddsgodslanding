services:
  - type: web
    name: odds-gods-wato
    env: node
    region: ohio
    plan: starter
    rootDir: .
    branch: main
    autoDeployTrigger: commit
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: BRACKET_APP_URL
        sync: false
      - key: WATO_APP_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ODDS_API_KEY
        sync: false

  - type: web
    name: odds-gods-landing
    env: static
    rootDir: .
    branch: main
    autoDeployTrigger: commit
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /blog
        destination: /index.html
      - type: rewrite
        source: /blog/*
        destination: /index.html
      - type: rewrite
        source: /admin/blog
        destination: /index.html
      - type: rewrite
        source: /admin/blog/*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

  - type: web
    name: odds-gods-bracket
    env: static
    repo: https://github.com/egomaniacsfantasy/EgomaniacsBracket.git
    branch: main
    autoDeployTrigger: commit
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
