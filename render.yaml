services:
  - type: web
    name: odds-gods-wato
    env: node
    region: ohio
    plan: starter
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: BRACKET_APP_URL
        sync: false
      - key: WATO_APP_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ODDS_API_KEY
        sync: false

  - type: web
    name: odds-gods-landing
    env: static
    rootDir: .
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

  - type: web
    name: odds-gods-bracket
    env: static
    rootDir: EgomaniacsBracketOdds
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
