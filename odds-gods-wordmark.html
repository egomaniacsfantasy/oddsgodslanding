<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odds Gods Wordmark</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0e0c09;
        --odds: #f0e6d0;
        --gods: #fae8c7;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: var(--bg);
      }
      body {
        display: grid;
        place-items: center;
      }
      .wordmark {
        font-family: "Instrument Serif", serif;
        text-transform: uppercase;
        letter-spacing: 0.13em;
        line-height: 1;
        font-size: clamp(120px, 19vw, 420px);
        color: var(--odds);
        white-space: nowrap;
      }
      .wordmark strong {
        color: var(--gods);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="wordmark"><span>ODDS</span>&nbsp;<strong>GODS</strong></div>
  </body>
</html>
